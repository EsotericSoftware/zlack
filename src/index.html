<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zlack</title>
    <style>
      :root { color-scheme: light dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #4a154b; /* Slack aubergine */
        color: #f4ede4;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .splash {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
      }
      .spinner {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(244, 237, 228, 0.25);
        border-top-color: #f4ede4;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .label { font-size: 0.95rem; letter-spacing: 0.02em; opacity: 0.85; }
    </style>
  </head>
  <body>
    <!--
      Zlack loads the Slack web client directly via a Tauri external window URL
      (see src-tauri/src/main.rs). This page only exists as the bundled distDir
      placeholder / fallback splash and is not normally rendered.
    -->
    <div class="splash">
      <div class="spinner" role="status" aria-label="Loading"></div>
      <div class="label">Loading Zlack...</div>
    </div>
  </body>
</html>
